name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  PYTHON_DEFAULT: "3.11"

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install lint dependencies
        run: |
          pip install ruff==0.3.0 mypy==1.9.0
          pip install pydantic==2.6.0 pydantic-settings==2.2.0 fastapi==0.110.0 \
            sqlalchemy[asyncio]==2.0.0 httpx==0.27.0 python-jose[cryptography]==3.3.0 \
            redis==5.0.0 pika==1.3.2

      - name: Run ruff
        run: ruff check shared/ journey_booking/ conflict_detection/ notification/ road_routing/ traffic_authority/

      - name: Run mypy
        run: |
          mypy shared/ --ignore-missing-imports --no-strict-optional || true

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install shared + test dependencies
        run: |
          pip install fastapi==0.110.0 uvicorn[standard]==0.27.0 pydantic==2.6.0 \
            pydantic-settings==2.2.0 sqlalchemy[asyncio]==2.0.0 asyncpg==0.29.0 \
            python-jose[cryptography]==3.3.0 httpx==0.27.0 python-multipart==0.0.9 \
            pika==1.3.2 redis==5.0.0 python-telegram-bot==20.7 \
            pytest==8.0.0 pytest-asyncio==0.23.5 pytest-cov==5.0.0 \
            aiosqlite==0.20.0 faker==24.0.0

      - name: Run journey_booking tests
        run: |
          cd journey_booking
          PYTHONPATH=../:. pytest app/tests/ --asyncio-mode=auto \
            --cov=app --cov-report=term-missing --cov-fail-under=70 -v
        env:
          DATABASE_URL: "postgresql+asyncpg://dummy:dummy@localhost/dummy"
          KEYCLOAK_URL: "http://localhost:8080"
          APP_NAME: "journey_booking"

      - name: Run conflict_detection tests
        run: |
          cd conflict_detection
          PYTHONPATH=../:. pytest app/tests/ --asyncio-mode=auto \
            --cov=app --cov-report=term-missing --cov-fail-under=70 -v
        env:
          DATABASE_URL: "postgresql+asyncpg://dummy:dummy@localhost/dummy"
          KEYCLOAK_URL: "http://localhost:8080"
          APP_NAME: "conflict_detection"

      - name: Run notification tests
        run: |
          cd notification
          PYTHONPATH=../:. pytest app/tests/ --asyncio-mode=auto \
            --cov=app --cov-report=term-missing --cov-fail-under=70 -v
        env:
          DATABASE_URL: "postgresql+asyncpg://dummy:dummy@localhost/dummy"
          KEYCLOAK_URL: "http://localhost:8080"
          APP_NAME: "notification"

      - name: Run road_routing tests
        run: |
          cd road_routing
          PYTHONPATH=../:. pytest app/tests/ --asyncio-mode=auto \
            --cov=app --cov-report=term-missing --cov-fail-under=70 -v
        env:
          DATABASE_URL: "postgresql+asyncpg://dummy:dummy@localhost/dummy"
          KEYCLOAK_URL: "http://localhost:8080"
          APP_NAME: "road_routing"

      - name: Run traffic_authority tests
        run: |
          cd traffic_authority
          PYTHONPATH=../:. pytest app/tests/ --asyncio-mode=auto \
            --cov=app --cov-report=term-missing --cov-fail-under=70 -v
        env:
          DATABASE_URL: "postgresql+asyncpg://dummy:dummy@localhost/dummy"
          KEYCLOAK_URL: "http://localhost:8080"
          APP_NAME: "traffic_authority"

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Build all services
        run: docker compose build

      - name: Start services and verify health
        run: |
          docker compose up -d
          sleep 30
          docker compose ps

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy to Azure EU VM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/traffic-service
            git pull origin main
            docker compose up --build -d
            docker compose ps

      - name: Notify success via Telegram
        if: success()
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: "✅ TrafficBook deployed successfully to EU VM from branch main"

      - name: Notify failure via Telegram
        if: failure()
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: "❌ TrafficBook deployment FAILED on EU VM. Check GitHub Actions."
