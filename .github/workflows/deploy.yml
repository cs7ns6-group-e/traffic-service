name: Deploy TrafficBook — All Regions

on:
  push:
    branches: [main]

jobs:
  deploy-eu:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EU (Belgium)
        uses: appleboy/ssh-action@master
        with:
          host:            ${{ secrets.EU_VM_HOST }}
          username:        ${{ secrets.VM_USER }}
          key:             ${{ secrets.VM_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/traffic-service || git clone \
              https://${{ secrets.GH_PAT }}@github.com/cs7ns6-group-e/traffic-service.git \
              ~/traffic-service
            git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/cs7ns6-group-e/traffic-service.git
            git fetch origin
            git reset --hard origin/main
            sed -i '/^version:/d' docker-compose.yml
            docker compose up --build -d
            sleep 15
            docker run --rm \
              -v ~/traffic-service:/app \
              -w /app node:20-alpine \
              sh -c "npm ci && npm run build"
            docker cp ~/traffic-service/dist/. traffic-service-nginx-1:/usr/share/nginx/html/
            docker compose restart nginx
            sleep 15
            curl -s http://localhost/health || true

  deploy-us:
    runs-on: ubuntu-latest
    needs: deploy-eu
    steps:
      - name: Deploy to US (Iowa)
        uses: appleboy/ssh-action@master
        with:
          host:            ${{ secrets.US_VM_HOST }}
          username:        ${{ secrets.VM_USER }}
          key:             ${{ secrets.VM_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/traffic-service || git clone \
              https://${{ secrets.GH_PAT }}@github.com/cs7ns6-group-e/traffic-service.git \
              ~/traffic-service
            git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/cs7ns6-group-e/traffic-service.git
            git fetch origin
            git reset --hard origin/main
            sed -i '/^version:/d' docker-compose.yml
            docker compose up --build -d
            sleep 15
            docker run --rm \
              -v ~/traffic-service:/app \
              -w /app node:20-alpine \
              sh -c "npm ci && npm run build"
            docker cp ~/traffic-service/dist/. traffic-service-nginx-1:/usr/share/nginx/html/
            docker compose restart nginx
            sleep 15
            curl -s http://localhost/health || true

  deploy-apac:
    runs-on: ubuntu-latest
    needs: deploy-eu
    steps:
      - name: Deploy to APAC (Singapore)
        uses: appleboy/ssh-action@master
        with:
          host:            ${{ secrets.APAC_VM_HOST }}
          username:        ${{ secrets.VM_USER }}
          key:             ${{ secrets.VM_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/traffic-service || git clone \
              https://${{ secrets.GH_PAT }}@github.com/cs7ns6-group-e/traffic-service.git \
              ~/traffic-service
            git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/cs7ns6-group-e/traffic-service.git
            git fetch origin
            git reset --hard origin/main
            sed -i '/^version:/d' docker-compose.yml
            docker compose up --build -d
            sleep 15
            docker run --rm \
              -v ~/traffic-service:/app \
              -w /app node:20-alpine \
              sh -c "npm ci && npm run build"
            docker cp ~/traffic-service/dist/. traffic-service-nginx-1:/usr/share/nginx/html/
            docker compose restart nginx
            sleep 15
            curl -s http://localhost/health || true
