version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trafficbook"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trafficbook
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - trafficbook
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trafficbook
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  auth_service:
    build: ./auth_service
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      APP_NAME: auth_service
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trafficbook
    restart: unless-stopped

  journey_booking:
    build:
      context: .
      dockerfile: journey_booking/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      APP_NAME: journey_booking
    deploy:
      replicas: 2
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - trafficbook
    restart: unless-stopped

  conflict_detection:
    build:
      context: .
      dockerfile: conflict_detection/Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      APP_NAME: conflict_detection
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - trafficbook
    restart: unless-stopped

  notification:
    build:
      context: .
      dockerfile: notification/Dockerfile
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      APP_NAME: notification
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - trafficbook
    restart: unless-stopped

  road_routing:
    build:
      context: .
      dockerfile: road_routing/Dockerfile
    ports:
      - "8004:8004"
    env_file: .env
    environment:
      APP_NAME: road_routing
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trafficbook
    restart: unless-stopped

  traffic_authority:
    build:
      context: .
      dockerfile: traffic_authority/Dockerfile
    ports:
      - "8005:8005"
    env_file: .env
    environment:
      APP_NAME: traffic_authority
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - trafficbook
    restart: unless-stopped

  admin_service:
    build: ./admin_service
    ports:
      - "8006:8006"
    env_file: .env
    environment:
      APP_NAME: admin_service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - trafficbook
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth_service
      - journey_booking
      - conflict_detection
      - notification
      - road_routing
      - traffic_authority
      - admin_service
    networks:
      - trafficbook
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Monitoring
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - trafficbook
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - trafficbook
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:

networks:
  trafficbook:
    driver: bridge
