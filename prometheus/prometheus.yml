global:
  scrape_interval: 15s

scrape_configs:
  - job_name: trafficbook
    static_configs:
      - targets:
          - auth_service:8000
          - journey_booking:8001
          - conflict_detection:8002
          - notification:8003
          - road_routing:8004
          - traffic_authority:8005
          - admin_service:8006
    metrics_path: /metrics

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']

  - job_name: postgres
    static_configs:
      - targets: ['postgres:9187']
