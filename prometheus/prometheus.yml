global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "auth_service"
    static_configs:
      - targets: ["auth_service:8000"]

  - job_name: "journey_booking"
    static_configs:
      - targets: ["journey_booking:8001"]

  - job_name: "conflict_detection"
    static_configs:
      - targets: ["conflict_detection:8002"]

  - job_name: "notification"
    static_configs:
      - targets: ["notification:8003"]

  - job_name: "road_routing"
    static_configs:
      - targets: ["road_routing:8004"]

  - job_name: "traffic_authority"
    static_configs:
      - targets: ["traffic_authority:8005"]

  - job_name: "admin_service"
    static_configs:
      - targets: ["admin_service:8006"]

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]
