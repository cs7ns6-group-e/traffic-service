events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

  upstream auth      { server auth_service:8000; }
  upstream journey   {
    server journey_booking:8001;
    server journey_booking:8001;
  }
  upstream conflict  { server conflict_detection:8002; }
  upstream notify    { server notification:8003; }
  upstream routing   { server road_routing:8004; }
  upstream authority { server traffic_authority:8005; }
  upstream admin     { server admin_service:8006; }

  server {
    listen 80;
    limit_req zone=api burst=20 nodelay;

    root /usr/share/nginx/html;
    index index.html;

    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }
    location /auth      { proxy_pass http://auth;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /journeys  { proxy_pass http://journey;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /conflicts/slots         { proxy_pass http://conflict/slots;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /conflicts/reserve-slot  { proxy_pass http://conflict/reserve-slot;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /conflicts/release-slot  { proxy_pass http://conflict/release-slot;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /conflicts { proxy_pass http://conflict;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /notify    { proxy_pass http://notify;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /route     { proxy_pass http://routing;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /routes    { proxy_pass http://routing;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /search    { proxy_pass http://routing;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /authority { proxy_pass http://authority; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /admin     { proxy_pass http://admin;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  # Internal cross-region API — called directly by other VMs on port 8001
  server {
    listen 8001;
    location / {
      proxy_pass http://journey;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
