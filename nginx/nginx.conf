events { worker_connections 1024; }

http {
  limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

  upstream auth      { server auth_service:8000; }
  upstream journey   {
    server journey_booking:8001;
    server journey_booking:8001;
  }
  upstream conflict  { server conflict_detection:8002; }
  upstream notify    { server notification:8003; }
  upstream routing   { server road_routing:8004; }
  upstream authority { server traffic_authority:8005; }
  upstream admin     { server admin_service:8006; }

  server {
    listen 80;
    limit_req zone=api burst=20 nodelay;

    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }
    location /auth      { proxy_pass http://auth;      }
    location /journeys  { proxy_pass http://journey;   }
    location /conflicts { proxy_pass http://conflict;  }
    location /notify    { proxy_pass http://notify;    }
    location /route     { proxy_pass http://routing;   }
    location /routes    { proxy_pass http://routing;   }
    location /authority { proxy_pass http://authority; }
    location /admin     { proxy_pass http://admin;     }
  }
}
