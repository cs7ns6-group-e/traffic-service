events {
    worker_connections 1024;
}

http {
    # ---------------------------------------------------------------------------
    # Upstreams
    # ---------------------------------------------------------------------------
    upstream auth {
        server auth_service:8000;
    }

    upstream journey {
        server journey_booking:8001;
        server journey_booking:8001;
    }

    upstream conflict {
        server conflict_detection:8002;
    }

    upstream notify {
        server notification:8003;
    }

    upstream routing {
        server road_routing:8004;
    }

    upstream authority {
        server traffic_authority:8005;
    }

    upstream admin {
        server admin_service:8006;
    }

    # ---------------------------------------------------------------------------
    # Rate limiting: 10 requests/second per IP, burst=20
    # ---------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        # Apply rate limiting to all API routes
        limit_req zone=api burst=20 nodelay;

        location /auth {
            proxy_pass http://auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /journeys {
            proxy_pass http://journey;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /conflicts {
            proxy_pass http://conflict;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /notify {
            proxy_pass http://notify;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /route {
            proxy_pass http://routing;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /routes {
            proxy_pass http://routing;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /authority {
            proxy_pass http://authority;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /admin {
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            proxy_pass http://journey;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
