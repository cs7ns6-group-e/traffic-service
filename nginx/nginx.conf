events {
    worker_connections 1024;
}

http {
    upstream journey_booking {
        server journey_booking:8001;
    }
    upstream conflict_detection {
        server conflict_detection:8002;
    }
    upstream notification {
        server notification:8003;
    }
    upstream road_routing {
        server road_routing:8004;
    }
    upstream traffic_authority {
        server traffic_authority:8005;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    server {
        listen 80;
        server_name _;

        # Apply rate limiting to all API routes
        limit_req zone=api burst=10 nodelay;

        location /journeys {
            proxy_pass http://journey_booking;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /conflicts {
            proxy_pass http://conflict_detection;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /notifications {
            proxy_pass http://notification;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /route {
            proxy_pass http://road_routing;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /authority {
            proxy_pass http://traffic_authority;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            proxy_pass http://journey_booking;
            proxy_set_header Host $host;
        }
    }
}
